<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Buddy Login</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

</head>
<body>

    <div class="login-container">
        <h1 class="app-title">Study Buddy</h1>
        <h2 class="sub-title">Sign In to Continue</h2>


        <button class="auth-btn google-btn">
            <span class="material-icons">
                login
            </span>
            Sign in with Google
        </button>

        <button class="auth-btn phone-btn" disabled>
            <span class="material-icons">
                phone
            </span>
            Sign in with Phone (Coming Soon)
        </button>

        <p class="error-message" id="login-error" style="display:none;">Login failed. Please try again.</p>
    </div>

    <div class="background-sphere sphere-1"></div>
    <div class="background-sphere sphere-2"></div>


    <script>
        // =========================================================
        // 2. FIREBASE INITIALIZATION AND AUTHENTICATION LOGIC
        // (***This section remains unchanged from your original code***)
        // =========================================================

        // 1. ADD YOUR FIREBASE CONFIG HERE
        const firebaseConfig = {
          // **REPLACE** these values with your actual config!
          apiKey: "AIzaSyB03N9g29hXkl1jeKTim8VAUcJOpaf4360",
          authDomain: "study-buddy-app-39fee.firebaseapp.com",
          projectId: "study-buddy-app-39fee",
          storageBucket: "study-buddy-app-39fee.firebasestorage.app",
          messagingSenderId: "565990785771",
          appId: "1:565990785771:web:900f25fc51bbbab0d8f4ae",
          measurementId: "G-KEGV0KK6KB"
        };

        // Initialize Firebase app
        firebase.initializeApp(firebaseConfig);

        // Get the Authentication service instance
        const auth = firebase.auth();
        const errorMessageDisplay = document.getElementById('login-error');


        // 2. GOOGLE LOGIN HANDLER
        document.querySelector('.google-btn').addEventListener('click', () => {
            // Hide any previous errors
            errorMessageDisplay.style.display = 'none';

            const provider = new firebase.auth.GoogleAuthProvider();

            // Use signInWithPopup for a web application
            auth.signInWithPopup(provider)
                .then((result) => {
                    // On successful login, get the user's ID token
                    return result.user.getIdToken();
                })
                .then(token => {
                    // Send the token to the Flask backend endpoint '/login'
                    fetch('/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token: token })
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            // Redirect to the chat page
                            window.location.href = data.redirect;
                        } else {
                            // Handle backend failure
                            errorMessageDisplay.textContent = data.message || "Login failed on server side.";
                            errorMessageDisplay.style.display = 'block';
                            auth.signOut();
                        }
                    })
                    .catch(serverError => {
                        console.error("Server Communication Error:", serverError);
                        errorMessageDisplay.textContent = "A network error occurred. Please check your connection.";
                        errorMessageDisplay.style.display = 'block';
                        auth.signOut();
                    });
                })
                .catch((error) => {
                    // Handle client-side errors (e.g., popup closed, network error)
                    console.error("Google Sign-In Error:", error);
                    // Filter out the 'popup closed by user' error
                    if (error.code !== 'auth/popup-closed-by-user') {
                        errorMessageDisplay.textContent = "Google Sign-In failed. Please try again.";
                        errorMessageDisplay.style.display = 'block';
                    }
                });
        });

        // 3. PHONE LOGIN HANDLER (Placeholder)
        document.querySelector('.phone-btn').addEventListener('click', () => {
            alert("Phone Sign-in feature is under development. Please use Google Sign-in.");
        });

    </script>
</body>
</html>
