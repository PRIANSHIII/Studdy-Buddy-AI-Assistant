<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards - Study Buddy</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f0f8;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            color: #5B2C6F;
        }

        #flashcards-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
            margin-top: 20px;
        }

        .flashcard {
            perspective: 1000px;
        }

        .card-inner {
            position: relative;
            width: 100%;
            min-height: 150px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            transition: transform 0.6s;
            transform-style: preserve-3d;
            cursor: pointer;
            padding: 20px;
        }

        .card-inner.flipped {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-size: 16px;
        }

        .card-back {
            background: #5B2C6F;
            color: white;
            transform: rotateY(180deg);
        }
    </style>
</head>
<body>
    <h1>Flashcards</h1>
    <div id="flashcards-container"></div>

    <script>
        async function loadFlashcards() {
            const response = await fetch('/generate_flashcards_ajax', { method: 'POST' });
            const flashcards = await response.json();

            const container = document.getElementById('flashcards-container');
            container.innerHTML = '';

            flashcards.forEach(card => {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'flashcard';

                cardDiv.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front"><strong>Q:</strong> ${card.question}</div>
                        <div class="card-back"><strong>A:</strong> ${card.answer}</div>
                    </div>
                `;

                // Flip on click
                cardDiv.querySelector('.card-inner').addEventListener('click', () => {
                    cardDiv.querySelector('.card-inner').classList.toggle('flipped');
                });

                container.appendChild(cardDiv);
            });
        }

        window.onload = loadFlashcards;
    </script>
</body>
</html>
